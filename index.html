<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PadelFinder Berlin - Find Open Padel Courts</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #FFFFFF;
            color: #111827;
            line-height: 1.5;
        }

        /* Header */
        .header {
            border-bottom: 1px solid #E5E7EB;
            background: #FFFFFF;
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
        }

        .header-subtitle {
            font-size: 13px;
            color: #6B7280;
        }

        .tabs {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid #E5E7EB;
            margin: 0 -24px;
            padding: 0 24px;
        }

        .tab {
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
            color: #6B7280;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            color: #111827;
        }

        .tab.active {
            color: #111827;
            border-bottom-color: #059669;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Loading indicator */
        .loading-bar {
            display: none;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            font-size: 13px;
            color: #6B7280;
        }

        .loading-bar.active {
            display: block;
        }

        /* Shared Filter Bar */
        .shared-filters {
            display: none;
            padding: 16px 0;
            border-bottom: 1px solid #E5E7EB;
            margin-bottom: 20px;
        }

        .shared-filters.active {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-row-label {
            font-size: 12px;
            font-weight: 600;
            color: #6B7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-width: 60px;
        }

        .type-buttons {
            display: flex;
            gap: 8px;
        }

        .type-btn {
            padding: 6px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 4px;
            background: #FFFFFF;
            color: #374151;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .type-btn:hover {
            border-color: #059669;
            color: #059669;
        }

        .type-btn.active {
            background: #059669;
            color: #FFFFFF;
            border-color: #059669;
        }

        .district-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .district-chip {
            padding: 4px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 16px;
            background: #FFFFFF;
            color: #374151;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .district-chip:hover {
            border-color: #059669;
        }

        .district-chip.active {
            background: #059669;
            color: #FFFFFF;
            border-color: #059669;
        }

        .clear-chip {
            padding: 4px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 16px;
            background: transparent;
            color: #9CA3AF;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .clear-chip:hover {
            color: #374151;
        }

        /* Views */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* Weekly View */
        .week-navigator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .week-label {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
        }

        .nav-button {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #111827;
            transition: all 0.2s;
        }

        .nav-button:hover {
            background: #E5E7EB;
        }

        .week-grid {
            overflow-x: auto;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            background: #FFFFFF;
        }

        .grid-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .grid-table thead th {
            padding: 12px 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #111827;
            border-bottom: 1px solid #E5E7EB;
            background: #F9FAFB;
        }

        .grid-table tbody td {
            padding: 0;
            border: 1px solid #E5E7EB;
            text-align: center;
            height: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 500;
        }

        .grid-table tbody td:hover {
            background: #F0FDF4;
        }

        .grid-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #111827;
        }

        .grid-cell.empty {
            color: #D1D5DB;
        }

        /* All Venues View */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 10px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .venues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .venue-card {
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 16px;
            background: #FFFFFF;
            transition: all 0.2s;
        }

        .venue-card:hover {
            border-color: #059669;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.1);
        }

        .venue-name {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 8px;
        }

        .venue-name a {
            color: #059669;
            text-decoration: none;
        }

        .venue-name a:hover {
            text-decoration: underline;
        }

        .venue-meta {
            font-size: 12px;
            color: #6B7280;
            margin-bottom: 12px;
        }

        .venue-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .slot-pill {
            padding: 4px 8px;
            background: #F0FDF4;
            border: 1px solid #D1F0D8;
            border-radius: 4px;
            font-size: 12px;
            color: #047857;
        }

        .slot-pill a {
            color: #047857;
            text-decoration: none;
            font-weight: 500;
        }

        .slot-pill a:hover {
            text-decoration: underline;
        }

        /* Map View */
        #mapContainer {
            height: 600px;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            overflow: hidden;
        }

        .map-list {
            margin-top: 20px;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            max-height: 300px;
            overflow-y: auto;
        }

        .map-list-item {
            padding: 12px 16px;
            border-bottom: 1px solid #E5E7EB;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .map-list-item:last-child {
            border-bottom: none;
        }

        .map-list-item:hover {
            background: #F0FDF4;
        }

        /* Drill-down Panel */
        .panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: #FFFFFF;
            border-left: 1px solid #E5E7EB;
            box-shadow: -4px 0 12px rgba(0, 0, 0, 0.1);
            z-index: 200;
            overflow-y: auto;
            transition: right 0.3s;
        }

        .panel.active {
            right: 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #E5E7EB;
            position: sticky;
            top: 0;
            background: #FFFFFF;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #6B7280;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
        }

        .close-btn:hover {
            color: #111827;
        }

        .panel-content {
            padding: 16px;
        }

        .venue-detail {
            margin-bottom: 16px;
        }

        .venue-detail-title {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }

        .venue-detail-value {
            font-size: 13px;
            color: #6B7280;
        }

        .venue-detail-value a {
            color: #059669;
            text-decoration: none;
        }

        .venue-detail-value a:hover {
            text-decoration: underline;
        }

        .slot-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .slot-item {
            padding: 12px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slot-item a {
            color: #059669;
            text-decoration: none;
            font-weight: 500;
        }

        .slot-item a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #E5E7EB;
            padding: 24px;
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #9CA3AF;
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 150;
        }

        .chat-bubble {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #059669;
            color: #FFFFFF;
            border: none;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
            transition: all 0.2s;
        }

        .chat-bubble:hover {
            background: #047857;
            box-shadow: 0 6px 16px rgba(5, 150, 105, 0.4);
        }

        /* Select All Chip */
        .select-all-chip {
            padding: 4px 12px;
            border: 1px solid #059669;
            border-radius: 16px;
            background: #F0FDF4;
            color: #059669;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .select-all-chip:hover {
            background: #DCFCE7;
            border-color: #059669;
        }

        /* Day Selector */
        .day-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .day-btn {
            padding: 8px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            background: #FFFFFF;
            color: #374151;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .day-btn:hover {
            border-color: #059669;
            color: #059669;
        }

        .day-btn.active {
            background: #059669;
            color: #FFFFFF;
            border-color: #059669;
        }

        /* Weekly Legend */
        .weekly-legend {
            padding: 12px 16px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-top: none;
            border-radius: 0 0 6px 6px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="header-top">
                <div>
                    <h1 class="header-title">PadelFinder</h1>
                    <p class="header-subtitle">Find open padel courts in Berlin</p>
                </div>
            </div>
            <div class="tabs">
                <button class="tab active" data-view="weekly">Weekly Overview</button>
                <button class="tab" data-view="venues">All Venues</button>
                <button class="tab" data-view="map">Map</button>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Shared Filters (visible on Weekly and All Venues) -->
        <div class="shared-filters active" id="sharedFilters">
            <!-- Type Filter Row -->
            <div class="filter-row">
                <span class="filter-row-label">Type:</span>
                <div class="type-buttons">
                    <button class="type-btn active" data-type="all">All</button>
                    <button class="type-btn" data-type="indoor">Indoor</button>
                    <button class="type-btn" data-type="outdoor">Outdoor</button>
                </div>
            </div>
            <!-- District Filter Row -->
            <div class="filter-row">
                <span class="filter-row-label">Districts:</span>
                <div class="district-chips" id="districtChips"></div>
            </div>
        </div>

        <!-- Error Banner -->
        <div class="loading-bar" id="errorBanner" style="background:#FEF2F2;border-color:#FECACA;color:#991B1B;display:none;">
            Could not load venue data. Please refresh the page to try again.
        </div>

        <!-- Loading Bar -->
        <div class="loading-bar" id="loadingBar">Loading venues...</div>

        <!-- WEEKLY VIEW -->
        <div class="view active" id="weeklyView">
            <div class="week-navigator">
                <button class="nav-button" id="prevWeek">← Previous</button>
                <div class="week-label" id="weekLabel"></div>
                <button class="nav-button" id="nextWeek">Next →</button>
            </div>
            <div class="week-grid">
                <table class="grid-table" id="weekGrid">
                    <thead>
                        <tr id="weekHeader"></tr>
                    </thead>
                    <tbody id="weekBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ALL VENUES VIEW -->
        <div class="view" id="venuesView">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search venues..." />
            </div>
            <div class="venues-grid" id="venuesGrid"></div>
        </div>

        <!-- MAP VIEW -->
        <div class="view" id="mapView">
            <div id="mapContainer"></div>
            <div class="map-list" id="mapList"></div>
        </div>
    </div>

    <!-- Drill-down Panel -->
    <div class="panel" id="panel">
        <div class="panel-header">
            <div class="panel-title" id="panelTitle">Venue Details</div>
            <button class="close-btn" id="closePanel">×</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <!-- Chat Widget -->
    <div class="chat-widget">
        <button class="chat-bubble">💬</button>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>PadelFinder Berlin &copy; 2026 | Powered by Playtomic</p>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <script>
        // ================== CONSTANTS ==================
        const VENUE_META = {
            "aa7e1831-a90d-4a4f-b6ae-f6d334179907": {district:"Mitte",website:"https://beachmitte.de"},
            "8b818dae-aacb-4ea3-aa7b-0e77b1149c85": {district:"Charlottenburg",website:"https://mittepadel.com"},
            "6adc7add-0547-4f48-830e-153f9aa5948d": {district:"Lichtenberg",website:"https://padelberlin.de"},
            "9fea856e-7d1a-4cae-9831-79015318967b": {district:"Tempelhof",website:"https://pbc-center.com"},
            "4a3497a5-f9bd-43eb-9aaa-a972a856b3d2": {district:"Reinickendorf",website:"https://padel-bros.de"},
            "632ca5b0-93bc-4718-a3e9-288bc2fe507d": {district:"Neukölln",website:"https://padelneukoelln.de"},
            "0220b0b5-c27a-4433-9c91-1798aaec5250": {district:"Lichtenberg",website:"https://padelfc.net"},
            "528af083-c941-480e-9d80-b79c82e5bd3f": {district:"Wedding",website:"https://playtomic.io/padel-mitte"},
            "7b481280-1f2b-455d-99c7-c1127d6d5137": {district:"Kreuzberg",website:"https://playtomic.io/padel-club-frankfurt-berlin"},
            "d4506944-7eb2-40bd-b9ea-9ad4a769db04": {district:"Kreuzberg",website:"https://playtomic.io/birgit"},
            "041a4a3c-8895-465d-91d1-c22f75049770": {district:"Lichtenberg",website:"https://playtomic.io/tio-tio-rooftop"},
            "8baa8d07-f342-4a05-8c49-e4e754f305db": {district:"Charlottenburg",website:"https://playtomic.io/berlin"},
            "d3edd4f5-1930-4d19-aba8-44d62f8f9da8": {district:"Reinickendorf",website:"https://playtomic.io/fuechse-berlin"},
            "31bb4900-5ad3-424a-a7fe-ed49ed2bf8e8": {district:"Neukölln",website:"https://playtomic.io/grenzallee-padel"},
            "f6f12032-198e-4657-ab45-8aeb0b8a24b5": {district:"Steglitz",website:"https://playtomic.io/padel-lankwitz"},
            "28f8be6d-9b46-441e-889d-209cb55acce8": {district:"Treptow",website:"https://playtomic.io/padel-treptow"},
            "16825678-053a-400d-b626-4c386d58706b": {district:"Spandau",website:"https://playtomic.io/kickerworld-berlin-spandau"},
            "78b39d52-9275-4eeb-8466-1d66f7e1aa7b": {district:"Tempelhof",website:"https://playtomic.io/pdlx"}
        };

        // ================== STATE ==================
        let currentWeekStart = getMonday(new Date());
        let currentVenuesDay = formatDate(new Date()); // day selector for All Venues tab
        let venues = [];
        let availabilityCache = new Map();
        let currentSearchQuery = '';
        let map = null;
        let markers = {};
        let currentView = 'weekly';

        let filterState = {
            type: 'all',
            districts: new Set()
        };

        // ================== UTILITY FUNCTIONS ==================
        function getMonday(d) {
            d = new Date(d);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDate(d) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDayName(d) {
            return d.toLocaleDateString('en-US', { weekday: 'short' });
        }

        function getDateLabel(d) {
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function formatTime(t) {
            return t.substring(0, 5);
        }

        function parsePrice(priceStr) {
            // "30 EUR" -> 30
            if (!priceStr) return null;
            const match = priceStr.match(/(\d+)/);
            return match ? parseInt(match[1]) : null;
        }

        // ================== CORS FETCH ==================
        const PROXY_STRATEGIES = [
            { name: 'direct', build: (url) => url },
            { name: 'codetabs', build: (url) => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(url) },
            { name: 'corsproxy', build: (url) => 'https://corsproxy.io/?' + encodeURIComponent(url) },
        ];

        let workingProxy = null; // remember which proxy worked last

        async function fetchWithCORS(url) {
            // If we already know a working proxy, try it first
            const strategies = workingProxy
                ? [workingProxy, ...PROXY_STRATEGIES.filter(s => s.name !== workingProxy.name)]
                : PROXY_STRATEGIES;

            for (const strategy of strategies) {
                try {
                    const proxyUrl = strategy.build(url);
                    const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
                    if (r.ok) {
                        const data = await r.json();
                        if (data && !data.error) {
                            workingProxy = strategy;
                            console.log(`[PadelFinder] fetch OK via ${strategy.name}`);
                            return data;
                        }
                    }
                } catch (e) {
                    console.log(`[PadelFinder] ${strategy.name} failed:`, e.message);
                }
            }

            console.error('[PadelFinder] All proxy strategies failed for:', url);
            return null;
        }

        // ================== DATA LOADING ==================
        async function loadVenues() {
            const loading = document.getElementById('loadingBar');
            const errorBanner = document.getElementById('errorBanner');
            loading.textContent = 'Loading venues...';
            loading.classList.add('active');
            errorBanner.style.display = 'none';

            const url = `https://api.playtomic.io/v1/tenants?coordinate=52.5200,13.4050&sport_id=PADEL&radius=50000&size=50`;
            const data = await fetchWithCORS(url);

            if (data && Array.isArray(data)) {
                venues = data.filter(v => VENUE_META[v.tenant_id]);
                console.log(`[PadelFinder] Loaded ${venues.length} known venues from ${data.length} total`);
            } else {
                venues = [];
                console.error('[PadelFinder] Failed to load venues — data was:', data);
                loading.classList.remove('active');
                errorBanner.style.display = 'block';
                return;
            }

            populateDistrictFilter();
            loadWeeklyData();
        }

        async function getAvailability(tenantId, dateStr) {
            const cacheKey = `${tenantId}_${dateStr}`;
            if (availabilityCache.has(cacheKey)) {
                return availabilityCache.get(cacheKey);
            }

            const url = `https://api.playtomic.io/v1/availability?sport_id=PADEL&tenant_id=${tenantId}&local_start_min=${dateStr}T07:00:00&local_start_max=${dateStr}T23:00:00`;
            const data = await fetchWithCORS(url);
            const result = Array.isArray(data) ? data : [];
            availabilityCache.set(cacheKey, result);
            return result;
        }

        // ================== FILTERING ==================
        function getFilteredVenues() {
            return venues.filter(v => {
                // Type filter
                if (filterState.type !== 'all') {
                    const hasType = v.resources.some(r =>
                        r.properties && r.properties.resource_type === filterState.type
                    );
                    if (!hasType) return false;
                }
                // District filter
                if (filterState.districts.size > 0) {
                    const meta = VENUE_META[v.tenant_id];
                    if (!meta || !filterState.districts.has(meta.district)) return false;
                }
                // Search filter
                if (currentSearchQuery) {
                    if (!v.tenant_name.toLowerCase().includes(currentSearchQuery.toLowerCase())) return false;
                }
                return true;
            });
        }

        function populateDistrictFilter() {
            const districts = new Set();
            venues.forEach(v => {
                const meta = VENUE_META[v.tenant_id];
                if (meta && meta.district) {
                    districts.add(meta.district);
                }
            });
            const sorted = Array.from(districts).sort();
            const container = document.getElementById('districtChips');
            container.innerHTML = '';
            
            // Add Select All chip first
            const selectAllChip = document.createElement('button');
            selectAllChip.className = 'select-all-chip';
            selectAllChip.textContent = 'Select All';
            selectAllChip.addEventListener('click', () => selectAllDistricts());
            container.appendChild(selectAllChip);
            
            sorted.forEach(d => {
                const chip = document.createElement('button');
                chip.className = 'district-chip';
                chip.textContent = d;
                chip.addEventListener('click', () => toggleDistrict(d));
                container.appendChild(chip);
            });
            const clearChip = document.createElement('button');
            clearChip.className = 'clear-chip';
            clearChip.textContent = 'Clear';
            clearChip.addEventListener('click', () => clearAllDistricts());
            container.appendChild(clearChip);
        }

        function selectAllDistricts() {
            filterState.districts.clear();
            const districts = new Set();
            venues.forEach(v => {
                const meta = VENUE_META[v.tenant_id];
                if (meta && meta.district) {
                    districts.add(meta.district);
                }
            });
            districts.forEach(d => filterState.districts.add(d));
            updateDistrictChips();
            applyFilters();
        }

        function toggleDistrict(district) {
            if (filterState.districts.has(district)) {
                filterState.districts.delete(district);
            } else {
                filterState.districts.add(district);
            }
            updateDistrictChips();
            applyFilters();
        }

        function clearAllDistricts() {
            filterState.districts.clear();
            updateDistrictChips();
            applyFilters();
        }

        function updateDistrictChips() {
            document.querySelectorAll('.district-chip').forEach(chip => {
                chip.classList.remove('active');
                if (filterState.districts.has(chip.textContent)) {
                    chip.classList.add('active');
                }
            });
        }

        function setTypeFilter(type) {
            filterState.type = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.type-btn[data-type="${type}"]`).classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            if (currentView === 'weekly') {
                renderWeeklyGrid();
            } else if (currentView === 'venues') {
                renderAllVenues();
            }
        }

        // ================== WEEKLY VIEW ==================
        function countSlotsForCell(dateStr, hour) {
            let count = 0;
            const filtered = getFilteredVenues();
            for (const v of filtered) {
                const avail = availabilityCache.get(`${v.tenant_id}_${dateStr}`);
                if (!avail) continue;
                avail.forEach(resource => {
                    // If type filter active, check resource type
                    if (filterState.type !== 'all') {
                        const venueResource = v.resources.find(r => r.resource_id === resource.resource_id);
                        if (!venueResource?.properties?.resource_type ||
                            venueResource.properties.resource_type !== filterState.type) return;
                    }
                    (resource.slots || []).forEach(s => {
                        if (parseInt(s.start_time.split(':')[0]) === hour) count++;
                    });
                });
            }
            return count;
        }

        function getBackgroundColor(count) {
            if (count === 0) return '#FFFFFF';
            if (count <= 5) return '#F0FDF4';
            if (count <= 20) return '#DCFCE7';
            if (count <= 50) return '#BBF7D0';
            return '#86EFAC';
        }

        async function loadWeeklyData() {
            const loading = document.getElementById('loadingBar');
            loading.classList.add('active');

            const filtered = getFilteredVenues();
            const days = 7;
            let completed = 0;

            for (let i = 0; i < days; i++) {
                const d = new Date(currentWeekStart);
                d.setDate(d.getDate() + i);
                const dateStr = formatDate(d);

                const promises = filtered.map(v => getAvailability(v.tenant_id, dateStr));
                await Promise.all(promises);

                completed++;
                const percent = Math.round((completed / days) * 100);
                loading.textContent = `Loading... ${percent}%`;
                renderWeeklyGrid();
            }

            loading.classList.remove('active');
        }

        function renderWeeklyGrid() {
            const header = document.getElementById('weekHeader');
            const body = document.getElementById('weekBody');
            header.innerHTML = '';
            body.innerHTML = '';

            // Build header
            const dayNames = ['Time'];
            for (let i = 0; i < 7; i++) {
                const d = new Date(currentWeekStart);
                d.setDate(d.getDate() + i);
                dayNames.push(`${getDayName(d)}<br>${getDateLabel(d)}`);
            }
            dayNames.forEach(day => {
                const th = document.createElement('th');
                th.innerHTML = day;
                header.appendChild(th);
            });

            // Build body
            for (let hour = 7; hour < 23; hour++) {
                const tr = document.createElement('tr');
                const timeCell = document.createElement('td');
                timeCell.innerHTML = `${hour}:00`;
                timeCell.style.fontWeight = '600';
                timeCell.style.backgroundColor = '#F9FAFB';
                tr.appendChild(timeCell);

                for (let i = 0; i < 7; i++) {
                    const d = new Date(currentWeekStart);
                    d.setDate(d.getDate() + i);
                    const dateStr = formatDate(d);
                    const count = countSlotsForCell(dateStr, hour);

                    const td = document.createElement('td');
                    const div = document.createElement('div');
                    div.className = 'grid-cell';
                    div.title = 'Cells show number of available slots';
                    
                    const bgColor = getBackgroundColor(count);
                    td.style.backgroundColor = bgColor;
                    
                    if (count === 0) {
                        div.classList.add('empty');
                        div.textContent = '—';
                    } else {
                        div.textContent = count;
                        div.style.cursor = 'pointer';
                        div.style.color = '#111827';
                        td.addEventListener('click', () => openWeeklyPanel(dateStr, hour));
                    }
                    td.appendChild(div);
                    tr.appendChild(td);
                }

                body.appendChild(tr);
            }

            // Update week label
            const endDate = new Date(currentWeekStart);
            endDate.setDate(endDate.getDate() + 6);
            document.getElementById('weekLabel').textContent =
                `${getDayName(currentWeekStart)} ${getDateLabel(currentWeekStart)} – ${getDayName(endDate)} ${getDateLabel(endDate)}`;
            
            // Add legend
            updateWeeklyLegend();
        }

        function updateWeeklyLegend() {
            let legend = document.getElementById('weeklyLegend');
            if (!legend) {
                legend = document.createElement('div');
                legend.id = 'weeklyLegend';
                legend.className = 'weekly-legend';
                const table = document.querySelector('.week-grid');
                table.parentNode.insertBefore(legend, table.nextSibling);
            }
            
            legend.innerHTML = `
                <div style="margin-top: 12px; font-size: 12px; color: #6B7280;">
                    <strong>Cells show number of available slots:</strong>
                    <div style="display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap;">
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <div style="width: 20px; height: 20px; background: #FFFFFF; border: 1px solid #E5E7EB;"></div>
                            <span>0 slots</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <div style="width: 20px; height: 20px; background: #F0FDF4;"></div>
                            <span>1–5</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <div style="width: 20px; height: 20px; background: #DCFCE7;"></div>
                            <span>6–20</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <div style="width: 20px; height: 20px; background: #BBF7D0;"></div>
                            <span>21–50</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <div style="width: 20px; height: 20px; background: #86EFAC;"></div>
                            <span>51+</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function openWeeklyPanel(dateStr, hour) {
            const filtered = getFilteredVenues();
            const slots = [];

            filtered.forEach(venue => {
                const avail = availabilityCache.get(`${venue.tenant_id}_${dateStr}`);
                if (!avail) return;

                avail.forEach(resource => {
                    // Look up the actual venue resource for name and type
                    const venueResource = venue.resources.find(r => r.resource_id === resource.resource_id);
                    const resType = venueResource?.properties?.resource_type || 'unknown';
                    const resName = venueResource?.name || 'Court';

                    // Check type filter
                    if (filterState.type !== 'all') {
                        if (resType !== filterState.type) return;
                    }

                    (resource.slots || []).forEach(s => {
                        if (parseInt(s.start_time.split(':')[0]) === hour) {
                            const meta = VENUE_META[venue.tenant_id] || {};
                            const price = parsePrice(s.price);
                            slots.push({
                                venue: venue.tenant_name,
                                venueId: venue.tenant_id,
                                slug: venue.slug,
                                resource: resName,
                                time: formatTime(s.start_time),
                                website: meta.website,
                                district: meta.district,
                                type: resType,
                                price: price
                            });
                        }
                    });
                });
            });

            showPanel(slots, dateStr, hour);
        }

        // ================== ALL VENUES VIEW ==================
        function renderDaySelector() {
            let daySelector = document.getElementById('daySelector');
            if (!daySelector) {
                daySelector = document.createElement('div');
                daySelector.id = 'daySelector';
                daySelector.className = 'day-selector';
                const searchBox = document.querySelector('.search-box');
                searchBox.parentNode.insertBefore(daySelector, searchBox.nextSibling);
            }
            
            daySelector.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dateStr = formatDate(d);
                
                const btn = document.createElement('button');
                btn.className = 'day-btn';
                if (dateStr === currentVenuesDay) {
                    btn.classList.add('active');
                }
                btn.textContent = `${getDayName(d)} ${getDateLabel(d)}`;
                btn.addEventListener('click', () => {
                    currentVenuesDay = dateStr;
                    renderDaySelector();
                    loadVenuesDataForDay();
                });
                daySelector.appendChild(btn);
            }
        }

        async function loadVenuesDataForDay() {
            const filtered = getFilteredVenues();
            const promises = filtered.map(v => getAvailability(v.tenant_id, currentVenuesDay));
            await Promise.all(promises);
            renderAllVenues();
        }

        function getPriceRange(venue, dateStr) {
            const avail = availabilityCache.get(`${venue.tenant_id}_${dateStr}`) || [];
            if (avail.length === 0) return null;
            
            const prices = [];
            avail.forEach(resource => {
                (resource.slots || []).forEach(s => {
                    const price = parsePrice(s.price);
                    if (price) prices.push(price);
                });
            });
            
            if (prices.length === 0) return null;
            const min = Math.min(...prices);
            const max = Math.max(...prices);
            if (min === max) return `€${min}`;
            return `€${min}–€${max}`;
        }

        function renderAllVenues() {
            const container = document.getElementById('venuesGrid');
            container.innerHTML = '';

            const filtered = getFilteredVenues();
            filtered.forEach(venue => {
                const meta = VENUE_META[venue.tenant_id] || {};
                const card = document.createElement('div');
                card.className = 'venue-card';

                const nameLink = document.createElement('a');
                nameLink.href = meta.website;
                nameLink.target = '_blank';
                nameLink.textContent = venue.tenant_name;

                const nameDiv = document.createElement('div');
                nameDiv.className = 'venue-name';
                nameDiv.appendChild(nameLink);

                const metaDiv = document.createElement('div');
                metaDiv.className = 'venue-meta';
                
                const indoorCount = venue.resources.filter(r => r.properties?.resource_type === 'indoor').length;
                const outdoorCount = venue.resources.filter(r => r.properties?.resource_type === 'outdoor').length;
                const types = [];
                if (indoorCount > 0) types.push('Indoor');
                if (outdoorCount > 0) types.push('Outdoor');
                const typeStr = types.join('/') || 'Courts';
                
                metaDiv.textContent = `${meta.district || 'Unknown'} • ${venue.resources.length} ${typeStr.toLowerCase()} • ${types.join('/')}`;

                const slotsDiv = document.createElement('div');
                slotsDiv.className = 'venue-slots';

                // Get selected day's slots
                const avail = availabilityCache.get(`${venue.tenant_id}_${currentVenuesDay}`) || [];

                if (avail.length === 0) {
                    slotsDiv.textContent = 'No slots available';
                } else {
                    const slotSet = new Set();
                    const slotPrices = new Map();
                    avail.forEach(resource => {
                        (resource.slots || []).forEach(s => {
                            const timeStr = formatTime(s.start_time);
                            slotSet.add(timeStr);
                            if (!slotPrices.has(timeStr)) {
                                slotPrices.set(timeStr, parsePrice(s.price));
                            }
                        });
                    });
                    
                    const slots = Array.from(slotSet).sort().slice(0, 5);
                    if (slots.length === 0) {
                        slotsDiv.textContent = 'No slots available';
                    } else {
                        slots.forEach(time => {
                            const price = slotPrices.get(time);
                            const priceStr = price ? ` (€${price})` : '';
                            
                            const pillLink = document.createElement('a');
                            pillLink.href = `https://playtomic.com/clubs/${venue.slug}`;
                            pillLink.target = '_blank';
                            pillLink.textContent = `${time}${priceStr}`;

                            const pill = document.createElement('div');
                            pill.className = 'slot-pill';
                            pill.appendChild(pillLink);
                            slotsDiv.appendChild(pill);
                        });
                    }
                }

                card.appendChild(nameDiv);
                card.appendChild(metaDiv);
                card.appendChild(slotsDiv);
                container.appendChild(card);
            });
        }

        // ================== MAP VIEW ==================
        async function initMap() {
            if (map) return;

            const mapContainer = document.getElementById('mapContainer');
            map = L.map(mapContainer).setView([52.52, 13.405], 12);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB',
                subdomains: 'abcd'
            }).addTo(map);

            venues.forEach(venue => {
                const meta = VENUE_META[venue.tenant_id];
                const lat = venue.address?.coordinate?.lat;
                const lon = venue.address?.coordinate?.lon;
                if (!meta || !lat || !lon) return;

                const marker = L.marker([lat, lon]).addTo(map);
                
                const today = formatDate(new Date());
                const priceRange = getPriceRange(venue, today);
                const priceStr = priceRange || 'Check availability';
                
                const indoorCount = venue.resources.filter(r => r.properties?.resource_type === 'indoor').length;
                const outdoorCount = venue.resources.filter(r => r.properties?.resource_type === 'outdoor').length;
                const types = [];
                if (indoorCount > 0) types.push('Indoor');
                if (outdoorCount > 0) types.push('Outdoor');
                const typeStr = types.join('/') || 'Courts';
                
                const popupContent = `
                    <div style="font-size: 13px;">
                        <strong><a href="${meta.website}" target="_blank" style="color: #059669; text-decoration: none;">${venue.tenant_name}</a></strong><br>
                        <span style="color: #6B7280; font-size: 12px;">
                            ${meta.district} • ${venue.resources.length} courts • ${typeStr}<br>
                            ${priceStr}
                        </span><br>
                        <a href="https://playtomic.com/clubs/${venue.slug}" target="_blank" style="color: #059669; text-decoration: none; font-size: 12px;">Book on Playtomic →</a>
                    </div>
                `;
                marker.bindPopup(popupContent);
                markers[venue.tenant_id] = marker;
            });
        }

        function updateMapList() {
            const list = document.getElementById('mapList');
            list.innerHTML = '';
            const filtered = getFilteredVenues();
            filtered.forEach(venue => {
                const item = document.createElement('div');
                item.className = 'map-list-item';
                const meta = VENUE_META[venue.tenant_id] || {};
                item.textContent = `${venue.tenant_name} (${meta.district})`;
                item.addEventListener('click', () => {
                    if (markers[venue.tenant_id]) {
                        const lat = venue.address?.coordinate?.lat;
                        const lon = venue.address?.coordinate?.lon;
                        map.setView([lat, lon], 15);
                        markers[venue.tenant_id].openPopup();
                    }
                });
                list.appendChild(item);
            });
        }

        // ================== PANEL ==================
        function showPanel(slots, dateStr, hour) {
            const panel = document.getElementById('panel');
            const title = document.getElementById('panelTitle');
            const content = document.getElementById('panelContent');

            const d = new Date(dateStr);
            const dateLabel = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            title.textContent = `Slots at ${hour}:00 on ${dateLabel}`;
            content.innerHTML = '';

            if (slots.length === 0) {
                content.innerHTML = '<p style="color: #6B7280; font-size: 13px;">No slots available.</p>';
            } else {
                const list = document.createElement('div');
                list.className = 'slot-list';
                slots.forEach(slot => {
                    const item = document.createElement('div');
                    item.className = 'slot-item';

                    const info = document.createElement('div');
                    const venueLink = document.createElement('a');
                    venueLink.href = slot.website;
                    venueLink.target = '_blank';
                    venueLink.style.fontWeight = '600';
                    venueLink.textContent = slot.venue;

                    const details = document.createElement('div');
                    details.style.fontSize = '12px';
                    details.style.color = '#6B7280';
                    details.style.marginTop = '4px';
                    const priceStr = slot.price ? ` • €${slot.price}` : '';
                    details.textContent = `${slot.resource} • ${slot.type}${priceStr}`;

                    info.appendChild(venueLink);
                    info.appendChild(details);

                    const bookLink = document.createElement('a');
                    bookLink.href = `https://playtomic.com/clubs/${slot.slug}`;
                    bookLink.target = '_blank';
                    bookLink.textContent = 'Book →';
                    bookLink.style.color = '#059669';
                    bookLink.style.textDecoration = 'none';
                    bookLink.style.fontWeight = '500';

                    item.appendChild(info);
                    item.appendChild(bookLink);
                    list.appendChild(item);
                });
                content.appendChild(list);
            }

            panel.classList.add('active');
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('active');
        }

        // ================== TAB SWITCHING ==================
        function switchView(viewName) {
            currentView = viewName;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            document.getElementById(`${viewName}View`).classList.add('active');
            document.querySelector(`[data-view="${viewName}"]`).classList.add('active');

            // Show/hide filter bar
            const filterBar = document.getElementById('sharedFilters');
            if (viewName === 'map') {
                filterBar.classList.remove('active');
            } else {
                filterBar.classList.add('active');
            }

            if (viewName === 'venues') {
                renderDaySelector();
                renderAllVenues();
                document.getElementById('searchInput').focus();
            } else if (viewName === 'map') {
                initMap();
                updateMapList();
            }
        }

        // ================== EVENT LISTENERS ==================
        document.addEventListener('DOMContentLoaded', () => {
            // Tab buttons
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchView(tab.dataset.view));
            });

            // Type filter buttons
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.addEventListener('click', () => setTypeFilter(btn.dataset.type));
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearchQuery = e.target.value;
                renderAllVenues();
            });

            // Week navigation
            document.getElementById('prevWeek').addEventListener('click', () => {
                currentWeekStart.setDate(currentWeekStart.getDate() - 7);
                loadWeeklyData();
            });

            document.getElementById('nextWeek').addEventListener('click', () => {
                currentWeekStart.setDate(currentWeekStart.getDate() + 7);
                loadWeeklyData();
            });

            // Close panel
            document.getElementById('closePanel').addEventListener('click', closePanel);
            document.getElementById('panel').addEventListener('click', (e) => {
                if (e.target.id === 'panel') closePanel();
            });

            // Load initial data
            loadVenues();
        });
</script>
</body>
</html>
